name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: "8.30.1"
      GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
    steps:
      - name: Check out full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "$archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" gitleaks
          chmod 0755 "$RUNNER_TEMP/gitleaks"

      - name: Scan complete Git history
        shell: bash
        run: |
          set -euo pipefail
          "$RUNNER_TEMP/gitleaks" git --redact --no-banner --verbose --config .gitleaks.toml .

  node:
    name: Node checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      # The workspace glob includes audit-api, auth-state, and snapshot-access
      # contract tests so authorization UI regressions cannot bypass CI.
      - name: Test web authorization, audit, and client contracts
        run: npm test --workspace @hermes-studio/web

      # The server script compiles and runs every dist/*.test.js file, including
      # remote-auth, remote-chat, gateway, and capability integration tests.
      - name: Test server authorization and runtime contracts
        run: npm run test:server

      - name: Build production web and server
        run: npm run build:production

  desktop:
    name: Desktop tests and compile check
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build bundled desktop assets
        run: npm run build:desktop-assets

      - name: Check pinned Rust toolchain
        run: rustc --version

      - name: Test Tauri runtime validation
        run: cargo test --locked --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Compile-check Tauri shell
        run: cargo check --locked --manifest-path apps/desktop/src-tauri/Cargo.toml
